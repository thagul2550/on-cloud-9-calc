<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNK48 × CGM48 — On Cloud 9 Festival</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --pink: #ff6b9d;
  --rose: #ff3d79;
  --lilac: #d4a5ff;
  --sky: #7ec8e3;
  --cream: #fffaf7;
  --ink: #1a0a2e;
  --ink2: #2d1b4e;
  --muted: #7a6892;
  --card: #ffffff;
  --border: rgba(212,165,255,0.25);
  --ticket-gold: #f9c74f;
  --shadow: 0 4px 24px rgba(26,10,46,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans Thai',sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height:100vh;
  background-image: 
    radial-gradient(ellipse at 10% 10%, rgba(255,107,157,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(126,200,227,0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(212,165,255,0.05) 0%, transparent 70%);
}

/* ─── HEADER ─── */
.hero {
  position: relative;
  text-align: center;
  padding: 3.5rem 1rem 2.5rem;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,107,157,0.06) 0%, rgba(212,165,255,0.1) 50%, rgba(126,200,227,0.06) 100%);
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #ff6b9d22, #d4a5ff22);
  border: 1px solid rgba(255,107,157,0.3);
  border-radius: 99px;
  padding: 5px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--rose);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 5vw, 36px);
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 0.4rem;
}
.hero h1 span {
  font-style: italic;
  background: linear-gradient(135deg, #ff6b9d, #d4a5ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 1rem;
  line-height: 1.6;
}
.hero-pills {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.hero-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink2);
  box-shadow: var(--shadow);
}
.hero-pill .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--pink);
}
.hero-pill.gold .dot { background: var(--ticket-gold); }
.hero-pill.sky .dot { background: var(--sky); }

/* ─── LAYOUT ─── */
.container { max-width: 960px; margin: 0 auto; padding: 0 1rem 5rem; }

/* ─── SECTION TITLE ─── */
.sec-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  margin-top: 2rem;
}
.sec-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--border), transparent);
}
.sec-title-text {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.sec-title-icon {
  font-size: 14px;
}

/* ─── MEMBER GRID ─── */
.mbr-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
  gap: 7px;
}
.mbr-btn {
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 9px 5px 8px;
  cursor: pointer;
  background: var(--card);
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  transition: all .18s cubic-bezier(.34,1.56,.64,1);
  font-family: 'Noto Sans Thai', sans-serif;
  box-shadow: 0 2px 8px rgba(26,10,46,0.04);
  position: relative;
  overflow: hidden;
  line-height: 1.3;
}
.mbr-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #ff6b9d15, #d4a5ff15);
  opacity: 0;
  transition: opacity .18s;
}
.mbr-btn:hover {
  border-color: rgba(255,107,157,0.5);
  color: var(--rose);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(255,107,157,0.15);
}
.mbr-btn:hover::before { opacity: 1; }
.mbr-btn.active {
  border-color: var(--pink);
  background: linear-gradient(135deg, #ff6b9d18, #d4a5ff18);
  color: var(--rose);
  font-weight: 700;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,107,157,0.2);
}
.mbr-btn-stage {
  grid-column: 1 / -1;
  border-radius: 14px;
  padding: 12px;
  background: linear-gradient(135deg, var(--ink) 0%, var(--ink2) 100%);
  border-color: rgba(212,165,255,0.3);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  box-shadow: 0 4px 16px rgba(26,10,46,0.25);
}
.mbr-btn-stage:hover {
  border-color: var(--lilac);
  color: var(--lilac);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(26,10,46,0.3);
}
.mbr-btn-stage.active {
  border-color: var(--lilac);
  background: linear-gradient(135deg, #2d1b4e, #4a2878);
  color: var(--lilac);
}
.mbr-btn-stage::before { display: none; }

/* ─── DAY TABS ─── */
.tab-nav {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.day-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Noto Sans Thai', sans-serif;
  transition: all .18s;
  box-shadow: 0 2px 8px rgba(26,10,46,0.04);
}
.day-tab:hover { border-color: rgba(255,107,157,0.4); color: var(--rose); }
.day-tab.active {
  background: linear-gradient(135deg, #ff6b9d, #ff3d79);
  border-color: transparent;
  color: #fff;
  font-weight: 700;
  box-shadow: 0 4px 16px rgba(255,107,157,0.35);
}
.day-tab .day-num {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  line-height: 1;
}

/* ─── BOOTH CARDS ─── */
.booth-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 1.1rem 1.2rem;
  margin-bottom: 10px;
  box-shadow: 0 2px 12px rgba(26,10,46,0.04);
  transition: border-color .2s;
}
.booth-card:hover { border-color: rgba(212,165,255,0.4); }
.booth-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.booth-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  flex: 1;
}
.ticket-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: linear-gradient(135deg, #f9c74f22, #f9c74f33);
  border: 1px solid rgba(249,199,79,0.4);
  border-radius: 99px;
  padding: 4px 12px;
  font-size: 10px;
  font-weight: 600;
  color: #b5860d;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}
.ticket-pill .ticket-ico { font-size: 11px; }

/* ─── ROUND ITEMS ─── */
.round-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 7px;
}
.round-item {
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 9px 11px;
  cursor: pointer;
  background: #fafafa;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  transition: all .18s;
}
.round-item:hover {
  border-color: rgba(255,107,157,0.4);
  background: #fff;
}
.round-item.sel {
  background: linear-gradient(135deg, #ff6b9d0d, #d4a5ff0d);
  border-color: var(--pink);
}
.round-time {
  font-family: 'DM Mono', monospace;
  font-size: 11.5px;
  font-weight: 500;
  color: var(--ink);
}
.round-with {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
  line-height: 1.4;
}
.round-item.sel .round-time { color: var(--rose); }
.round-item.sel .round-with { color: #c06080; }

/* ─── QTY CONTROL ─── */
.qty-ctrl {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.qty-btn {
  width: 24px; height: 24px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--pink);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: all .15s;
  font-weight: 700;
}
.qty-btn:hover {
  background: var(--pink);
  border-color: var(--pink);
  color: #fff;
  transform: scale(1.1);
}
.qty-num {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  min-width: 18px;
  text-align: center;
  color: var(--ink);
}

/* ─── SELECT ALL ─── */
.day-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  padding: 0 2px;
  flex-wrap: wrap;
  gap: 8px;
}
.day-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink2);
}
.sel-all-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: linear-gradient(135deg, #ff6b9d, #d4a5ff);
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  font-family: 'Noto Sans Thai', sans-serif;
  transition: all .15s;
  box-shadow: 0 3px 12px rgba(255,107,157,0.3);
}
.sel-all-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(255,107,157,0.4); }

/* ─── EMPTY ─── */
.empty-state {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--muted);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.7; }
.empty-text { font-size: 14px; }

/* ─── SUMMARY ─── */
.sum-wrap { margin-top: 2rem; }

/* Timeline */
.tl-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 1.1rem 0;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.tl-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 1.25rem 0.9rem;
  flex-wrap: wrap;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 6px;
}
.tl-filter-tabs {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.tl-tab {
  padding: 4px 12px;
  border-radius: 99px;
  border: 1.5px solid var(--border);
  background: transparent;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  font-family: 'Noto Sans Thai', sans-serif;
  transition: all .15s;
}
.tl-tab:hover { border-color: rgba(255,107,157,0.4); color: var(--rose); }
.tl-tab.active {
  background: var(--pink);
  border-color: transparent;
  color: #fff;
  font-weight: 600;
}
.tl-container {
  overflow-x: auto;
  padding: 10px 0 4px;
}
.tl-header-row {
  display: flex;
  border-bottom: 1px solid var(--border);
  min-width: 900px;
}
.tl-label-col {
  width: 56px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: #f8f6ff;
}
.tl-times {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(22, 1fr);
  background: #f8f6ff;
}
.tl-time-cell {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  color: var(--muted);
  font-weight: 500;
  padding: 6px 4px;
  border-right: 1px dashed rgba(212,165,255,0.3);
  grid-column: span 2;
}
.tl-body-row {
  display: flex;
  border-bottom: 1px solid rgba(212,165,255,0.15);
  min-width: 900px;
}
.tl-body-row:last-child { border-bottom: none; }
.tl-day-cell {
  width: 56px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: #f8f6ff;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 4px;
  font-size: 9.5px;
  font-weight: 700;
  color: var(--muted);
  text-align: center;
  line-height: 1.3;
}
.tl-track {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(22, 1fr);
  grid-auto-rows: min-content;
  gap: 3px;
  padding: 6px 4px;
  min-height: 46px;
  position: relative;
}
.event-chip {
  border-radius: 8px;
  padding: 5px 7px;
  font-size: 10px;
  line-height: 1.35;
  position: relative;
  overflow: hidden;
  cursor: default;
  transition: filter .15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.event-chip:hover { filter: brightness(0.95); }
.event-chip .chip-name { font-weight: 700; font-size: 10.5px; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event-chip .chip-booth { font-size: 9px; opacity: 0.75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip-del {
  position: absolute;
  top: 3px; right: 3px;
  width: 16px; height: 16px;
  border-radius: 4px;
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(0,0,0,0.08);
  color: #ef4444;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity .15s;
  line-height: 1;
}
.event-chip:hover .chip-del { opacity: 1; }
.chip-del:hover { background: #ef4444; color: #fff; border-color: #ef4444; }

/* Summary card */
.sum-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 1.2rem 1.3rem;
  box-shadow: var(--shadow);
}
.sum-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}
.sum-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px dashed rgba(212,165,255,0.2);
  gap: 8px;
}
.sum-row:last-of-type { border-bottom: none; }
.sum-row-label {
  flex: 1;
  font-size: 12px;
  color: var(--ink2);
  font-weight: 500;
  line-height: 1.4;
}
.sum-row-cost {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--rose);
  white-space: nowrap;
}
.sum-row-del {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 1px solid transparent;
  background: none;
  color: #ccc;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
  line-height: 1;
  font-weight: 300;
}
.sum-row-del:hover { background: #fee2e2; border-color: #fca5a5; color: #ef4444; }
.sum-divider {
  height: 1px;
  background: linear-gradient(to right, var(--pink), var(--lilac));
  margin: 14px 0;
  opacity: 0.3;
  border: none;
}
.sum-total-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
}
.sum-total-label {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
}
.sum-total-right { text-align: right; }
.sum-total-amt {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  background: linear-gradient(135deg, #ff3d79, #d4a5ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
  line-height: 1;
}
.sum-ticket-count {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  font-family: 'DM Mono', monospace;
}
.clear-btn {
  font-size: 11px;
  color: #ef4444;
  background: none;
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-family: 'Noto Sans Thai', sans-serif;
  font-weight: 500;
  transition: all .15s;
}
.clear-btn:hover { background: #fee2e2; border-color: #fca5a5; }

/* PDF Download button */
.pdf-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: linear-gradient(135deg, #1a0a2e, #2d1b4e);
  border: 1.5px solid rgba(212,165,255,0.3);
  border-radius: 12px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  font-family: 'Noto Sans Thai', sans-serif;
  transition: all .2s;
  box-shadow: 0 4px 16px rgba(26,10,46,0.25);
  margin-top: 14px;
  width: 100%;
  justify-content: center;
}
.pdf-btn:hover {
  background: linear-gradient(135deg, #2d1b4e, #4a2878);
  border-color: var(--lilac);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(26,10,46,0.3);
}
.pdf-btn:active { transform: translateY(0); }
.pdf-btn .pdf-ico { font-size: 16px; }
.pdf-btn.loading { opacity: 0.7; cursor: wait; pointer-events: none; }

/* No sched */
.no-sched {
  text-align: center;
  padding: 2.5rem;
  color: var(--muted);
  font-size: 13px;
  background: var(--card);
  border: 1.5px dashed var(--border);
  border-radius: 18px;
}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#e5d5f5;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#c4a5e0}

@media(max-width:600px){
  .round-grid{grid-template-columns:1fr}
  .mbr-grid{grid-template-columns:repeat(auto-fill,minmax(68px,1fr))}
  .hero h1{font-size:20px}
}

/* Animate in */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}
.booth-card { animation: fadeUp .25s ease both; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">🌸 Fan Event Planner</div>
  <h1>BNK48 × CGM48<br><span>On Cloud 9 Festival</span></h1>
  <div class="hero-sub">30 พฤษภาคม – 1 มิถุนายน 2026 · MCC Hall, The Mall Lifestore Bangkae</div>
  <div class="hero-pills">
    <div class="hero-pill"><span class="dot"></span>บูธกิจกรรม 8 บูธ</div>
    <div class="hero-pill gold"><span class="dot"></span>1 Ticket = ฿250 THB</div>
    <div class="hero-pill sky"><span class="dot"></span>3 วัน</div>
  </div>
</div>

<div class="container">

  <div class="sec-title">
    <span class="sec-title-icon">💜</span>
    <span class="sec-title-text">เลือกสมาชิก</span>
  </div>
  <div class="mbr-grid" id="mGrid"></div>

  <div id="schedArea">
    <div class="empty-state" style="margin-top:2.5rem">
      <div class="empty-icon">✨</div>

const DAYS = ["30 May 2026","31 May 2026","1 June 2026"];

  "30 May 2026":"เสาร์ 30 พ.ค.",
  "31 May 2026":"อาทิตย์ 31 พ.ค.",
  "1 June 2026":"จันทร์ 1 มิ.ย."
};

const memberSet = new Set();
Object.keys(SCHED).forEach(bid => {
  if(bid === 'fanmeet') return;
  Object.values(SCHED[bid]).forEach(slots => slots.forEach(s => s.slice(1).forEach(m => memberSet.add(m))));
});
const MEMBERS = [...memberSet].sort();

let state = { member: null, selections: {}, curDay: "30 May 2026" };
let tlFilterDay = 'All';

function initMembers() {
  const g = document.getElementById('mGrid');

  const stage = document.createElement('button');
  stage.className = 'mbr-btn mbr-btn-stage';
  stage.id = 'mb-⭐ กิจกรรมเวที';
  stage.textContent = '⭐ กิจกรรมเวทีทั้งหมด (Fanmeet & Stage)';
  stage.onclick = () => selMember('⭐ กิจกรรมเวที');
  g.appendChild(stage);

  MEMBERS.forEach(m => {
    const b = document.createElement('button');
    b.className = 'mbr-btn'; b.textContent = m; b.id = 'mb-' + m;
    b.onclick = () => selMember(m);
    g.appendChild(b);
  });
}

function selMember(m) {
  document.querySelectorAll('.mbr-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('mb-' + m);
  if(el) el.classList.add('active');
  state.member = m;
  renderSched();
}

function getKey(member, booth, day, idx) { return member + '|' + booth + '|' + day + '|' + idx; }

function renderSched() {
  const m = state.member;
  if(!m) return;
  const area = document.getElementById('schedArea');
  area.innerHTML = '';

  // Day tabs
  const tabNav = document.createElement('div');
  tabNav.className = 'tab-nav';
  tabNav.style.marginTop = '1.5rem';
  DAYS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (d === state.curDay ? ' active' : '');
    const parts = d.split(' ');
    btn.innerHTML = `<span class="day-num">${parts[0]}</span> ${parts[1]} ${parts[2]}`;
    btn.onclick = () => { state.curDay = d; renderSched(); };
    tabNav.appendChild(btn);
  });
  area.appendChild(tabNav);

  // Day bar
  const dayBar = document.createElement('div');
  dayBar.className = 'day-bar';
  dayBar.innerHTML = `<span class="day-label">📋 ${DAY_LABELS[state.curDay]}</span>
    <button class="sel-all-btn" onclick="selectAllDay()">✚ เลือกทั้งหมดในวันนี้</button>`;
  area.appendChild(dayBar);

  let hasAny = false;
  BOOTHS.forEach((booth, bi) => {
    const slots = (SCHED[booth.id] || {})[state.curDay] || [];
    const mySlots = slots.map((s, i) => ({s, i})).filter(({s}) => s.slice(1).includes(m));
    if(!mySlots.length) return;
    hasAny = true;

    const card = document.createElement('div');
    card.className = 'booth-card';
    card.style.animationDelay = (bi * 0.04) + 's';

    let ticketLabel = booth.tickets > 0
      ? `🎫 ${booth.tickets} Ticket${booth.tickets > 1 ? 's' : ''} = ฿${(booth.tickets * TICKET_PRICE).toLocaleString()}`
      : '✨ Free';

    card.innerHTML = `<div class="booth-header">
      <span class="booth-name">${booth.name}</span>
      <span class="ticket-pill"><span class="ticket-ico">🎟</span>${ticketLabel}</span>
    </div>`;

    const rg = document.createElement('div');
    rg.className = 'round-grid';

    mySlots.forEach(({s, i}) => {
      const key = getKey(m, booth.id, state.curDay, i);
      const qty = state.selections[key] || 0;
      const others = s.slice(1).filter(x => x !== m);
      const item = document.createElement('div');
      item.className = 'round-item' + (qty > 0 ? ' sel' : '');
      item.id = 'bi-' + key.replace(/\|/g, '_');

      let withText = (m === '⭐ กิจกรรมเวที') ? others.join(', ') : 'กับ ' + others.join(', ');

      item.innerHTML = `
        <div style="flex:1;min-width:0">
          <div class="round-time">${s[0]}</div>
          <div class="round-with">${withText}</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="chQty('${key}',${booth.tickets},-1)">−</button>
          <span class="qty-num" id="qn-${key.replace(/\|/g,'_')}">${qty}</span>
          <button class="qty-btn" onclick="chQty('${key}',${booth.tickets},1)">+</button>
        </div>`;
      rg.appendChild(item);
    });

    card.appendChild(rg);
    area.appendChild(card);
  });

  if(!hasAny) {
    const no = document.createElement('div');
    no.className = 'no-sched';
    no.textContent = `${m} ไม่มีรอบในวันนี้ 🌙`;
    area.appendChild(no);
  }
}

function chQty(key, tickets, delta) {
  const cur = state.selections[key] || 0;
  const next = Math.max(0, cur + delta);
  state.selections[key] = next;
  const sk = key.replace(/\|/g, '_');
  const qn = document.getElementById('qn-' + sk);
  if(qn) qn.textContent = next;
  const bi = document.getElementById('bi-' + sk);
  if(bi) bi.classList.toggle('sel', next > 0);
  updateSum();
}

function removeOrder(key) {
  state.selections[key] = 0;
  const sk = key.replace(/\|/g, '_');
  const qn = document.getElementById('qn-' + sk);
  if(qn) qn.textContent = 0;
  const bi = document.getElementById('bi-' + sk);
  if(bi) bi.classList.remove('sel');
  updateSum();
}

function clearAll() {
  state.selections = {};
  if(state.member) renderSched();
  updateSum();
}

function selectAllDay() {
  const m = state.member;
  if(!m) return;
  let changed = false;
  BOOTHS.forEach(booth => {
    const slots = (SCHED[booth.id] || {})[state.curDay] || [];
    slots.forEach((s, i) => {
      if(s.slice(1).includes(m)) {
        const key = getKey(m, booth.id, state.curDay, i);
        if(!state.selections[key]) { state.selections[key] = 1; changed = true; }
      }
    });
  });
  if(changed) { renderSched(); updateSum(); }
}

// Chip colors per booth type
const CHIP_STYLES = {
  fanmeet: { bg: '#f3e8ff', border: '#d8b4fe', color: '#7e22ce' },
  chabacha: { bg: '#fce7f3', border: '#fbcfe8', color: '#be185d' },
  sns: { bg: '#dcfce7', border: '#6ee7b7', color: '#047857' },
  hill: { bg: '#fff7ed', border: '#fed7aa', color: '#c2410c' },
  default: { bg: '#eff6ff', border: '#bfdbfe', color: '#1d4ed8' },
};

function toCol(tStr) {
  const [h, min] = tStr.split(':').map(Number);
  return (h * 60 + min - 630) / 30 + 1;
}

function updateSum() {
  let total = 0, totalTickets = 0;
  const rows = [];
  const tlMap = {};

  Object.entries(state.selections).forEach(([key, qty]) => {
    if(!qty) return;
    const [member, boothId, day, idxStr] = key.split('|');
    const idx = parseInt(idxStr);
    const booth = BOOTHS.find(b => b.id === boothId);
    if(!booth) return;
    const slot = ((SCHED[boothId] || {})[day] || [])[idx];
    if(!slot) return;

    let displayName = member;
    if(member === '⭐ กิจกรรมเวที') {
      displayName = slot.slice(1).filter(m => m !== '⭐ กิจกรรมเวที').join(', ');
    }

    const t = booth.tickets * qty;
    const c = t * TICKET_PRICE;
    total += c; totalTickets += t;
    const costText = t > 0 ? `${t} tickets = ฿${c.toLocaleString()}` : 'Free';
    rows.push({ label: `${displayName} — ${booth.short} (${day}) ${slot[0]} ×${qty}`, t, c, costText, key });

    if(!tlMap[day]) tlMap[day] = [];
    tlMap[day].push({ time: slot[0], boothId, boothName: booth.short, member: displayName, qty, key });
  });

  const sumArea = document.getElementById('sumArea');
  sumArea.style.display = rows.length ? 'block' : 'none';
  if(!rows.length) return;

  // Summary rows
  document.getElementById('sumRows').innerHTML = rows.map(r => `
    <div class="sum-row">
      <span class="sum-row-label">${r.label}</span>
      <span class="sum-row-cost">${r.costText}</span>
      <button class="sum-row-del" onclick="removeOrder('${r.key}')">×</button>
    </div>`).join('');
  document.getElementById('totalAmt').textContent = '฿' + total.toLocaleString();
  document.getElementById('ticketCount').textContent = `รวม ${totalTickets} tickets`;

  // TL tabs
  const tlTabs = document.getElementById('tlTabs');
  tlTabs.innerHTML = `<button class="tl-tab${tlFilterDay==='All'?' active':''}" onclick="setTlDay('All')">ทั้งหมด</button>`
    + DAYS.map(d => `<button class="tl-tab${tlFilterDay===d?' active':''}" onclick="setTlDay('${d}')">${d.split(' ').slice(0,2).join(' ')}</button>`).join('');

  // Timeline
  const times = ['10:30','11:30','12:30','13:30','14:30','15:30','16:30','17:30','18:30','19:30','20:30'];
  let tlHTML = `<div class="tl-header-row">
    <div class="tl-label-col" style="font-size:9px;color:var(--muted);padding:6px;display:flex;align-items:center;justify-content:center;font-weight:600">Date</div>
    <div class="tl-times">${times.map(t=>`<div class="tl-time-cell" style="grid-column:span 2">${t}</div>`).join('')}</div>
  </div>`;

  DAYS.forEach(day => {
    if(tlFilterDay !== 'All' && tlFilterDay !== day) return;
    const items = tlMap[day] || [];
    let eventsHTML = '';
    const occupied = [];
    items.forEach(ti => {
      const [st, et] = ti.time.split('–');
      const sCol = toCol(st);
      const eCol = et ? toCol(et) : sCol + 2;
      let row = 1;
      while(occupied.some(o => o.row === row && !(eCol <= o.start || sCol >= o.end))) row++;
      occupied.push({row, start: sCol, end: eCol});
      const style = CHIP_STYLES[ti.boothId] || CHIP_STYLES.default;
      eventsHTML += `<div class="event-chip" style="grid-column:${sCol}/${eCol};grid-row:${row};background:${style.bg};border-color:${style.border};color:${style.color}">
        <div class="chip-name">${ti.member}${ti.qty>1?' ×'+ti.qty:''}</div>
        <div class="chip-booth">${ti.boothName}</div>
        <button class="chip-del" onclick="removeOrder('${ti.key}')">×</button>
      </div>`;
    });
    tlHTML += `<div class="tl-body-row">
      <div class="tl-day-cell">${DAY_LABELS[day]}</div>
      <div class="tl-track">${eventsHTML}</div>
    </div>`;
  });

  document.getElementById('tlContainer').innerHTML = tlHTML;
}

function setTlDay(d) {
  tlFilterDay = d;
  updateSum();
}

// ─── PDF EXPORT via html2canvas ───
async function downloadPDF() {
  const btn = document.getElementById('pdfBtn');
  btn.classList.add('loading');
  btn.innerHTML = '⏳ กำลังสร้าง PDF...';
  await new Promise(r => setTimeout(r, 80));

  try {
    // ── Gather data ──
    const rows = [];
    const tlMap = {};
    let total = 0, totalTickets = 0;

    Object.entries(state.selections).forEach(([key, qty]) => {
      if(!qty) return;
      const [member, boothId, day, idxStr] = key.split('|');
      const booth = BOOTHS.find(b => b.id === boothId);
      if(!booth) return;
      const slot = ((SCHED[boothId] || {})[day] || [])[parseInt(idxStr)];
      if(!slot) return;
      let displayName = member === '⭐ กิจกรรมเวที'
        ? slot.slice(1).filter(m => m !== '⭐ กิจกรรมเวที').join(', ')
        : member;
      const t = booth.tickets * qty;
      const c = t * TICKET_PRICE;
      total += c; totalTickets += t;
      rows.push({ displayName, boothShort: booth.short, day, time: slot[0], qty, t, c, boothId });
      if(!tlMap[day]) tlMap[day] = [];
      tlMap[day].push({ time: slot[0], boothShort: booth.short, member: displayName, qty, boothId });
    });

    const dayOrder = { "30 May 2026":0, "31 May 2026":1, "1 June 2026":2 };
    rows.sort((a,b) => dayOrder[a.day]-dayOrder[b.day] || a.time.localeCompare(b.time));

    const dayFull = {
      "30 May 2026":"เสาร์ 30 พฤษภาคม 2026",
      "31 May 2026":"อาทิตย์ 31 พฤษภาคม 2026",
      "1 June 2026":"จันทร์ 1 มิถุนายน 2026"
    };
    const dayShort = {
      "30 May 2026":"เสาร์ 30/5",
      "31 May 2026":"อาทิตย์ 31/5",
      "1 June 2026":"จันทร์ 1/6"
    };
    const chipStyle = {
      fanmeet:  {bg:'#f3e8ff',color:'#7e22ce',border:'#d8b4fe'},
      chabacha: {bg:'#fce7f3',color:'#be185d',border:'#fbcfe8'},
      sns:      {bg:'#dcfce7',color:'#047857',border:'#6ee7b7'},
      hill:     {bg:'#fff7ed',color:'#c2410c',border:'#fed7aa'},
      default:  {bg:'#eff6ff',color:'#1d4ed8',border:'#bfdbfe'},
    };

    function toHH(tStr) {
      const [h,m] = tStr.split(':').map(Number);
      return (h*60+m-630)/30;
    }

    // ── Timeline — pure pixel positioning, no % widths ──
    const COLS = 22; // half-hour slots 10:30–21:30
    const times = ['10:30','11:30','12:30','13:30','14:30','15:30','16:30','17:30','18:30','19:30','20:30'];
    const DAY_W = 60;
    const SLOT_W = 32; // px per half-hour
    const TRACK_W = COLS * SLOT_W; // 22 * 32 = 704px
    const TL_W = DAY_W + TRACK_W;  // 764px

    function buildTimeline() {
      let h = `<div style="width:${TL_W}px;border:1.5px solid #e9d5ff;border-radius:10px;overflow:hidden;">`;

      // Header
      h += `<div style="display:flex;background:#f5f0ff;border-bottom:1px solid #e9d5ff;">`;
      h += `<div style="width:${DAY_W}px;min-width:${DAY_W}px;padding:5px 3px;font-size:8px;font-weight:700;color:#7c3aed;border-right:1px solid #e9d5ff;text-align:center;">วัน</div>`;
      h += `<div style="position:relative;width:${TRACK_W}px;height:22px;">`;
      times.forEach((t, i) => {
        h += `<div style="position:absolute;left:${i*SLOT_W*2}px;top:0;width:${SLOT_W*2}px;height:22px;padding:5px 2px;font-size:8px;font-weight:600;color:#6d28d9;box-sizing:border-box;">${t}</div>`;
      });
      h += `</div></div>`;

      // Day rows
      DAYS.forEach(day => {
        const items = tlMap[day] || [];
        if(!items.length) return;
        const occupied = [];
        const chips = items.map(ti => {
          const [st,et] = ti.time.split('–');
          const sH = toHH(st), eH = et ? toHH(et) : sH+2;
          let row = 0;
          while(occupied.some(o => o.row===row && !(eH<=o.start || sH>=o.end))) row++;
          occupied.push({row, start:sH, end:eH});
          return {...ti, sH, eH, row};
        });
        const maxRow = chips.reduce((m,c) => Math.max(m,c.row), 0);
        const ROW_H = 38;
        const trackH = (maxRow+1)*ROW_H + 8;

        h += `<div style="display:flex;border-top:1px solid #f0e8ff;">`;
        h += `<div style="width:${DAY_W}px;min-width:${DAY_W}px;padding:4px 2px;font-size:7.5px;font-weight:700;color:#6d28d9;border-right:1px solid #e9d5ff;background:#faf5ff;text-align:center;display:flex;align-items:center;justify-content:center;line-height:1.4;">${dayFull[day].replace(/ /g,'<br>')}</div>`;
        h += `<div style="position:relative;width:${TRACK_W}px;height:${trackH}px;overflow:hidden;">`;
        // grid lines
        times.forEach((t,i) => {
          h += `<div style="position:absolute;left:${i*SLOT_W*2}px;top:0;width:1px;height:100%;background:#ede9fe;"></div>`;
        });
        // chips
        chips.forEach(c => {
          const s = chipStyle[c.boothId] || chipStyle.default;
          const leftPx = c.sH * SLOT_W + 1;
          const widthPx = (c.eH - c.sH) * SLOT_W - 3;
          const topPx = c.row * ROW_H + 3;
          h += `<div style="position:absolute;left:${leftPx}px;top:${topPx}px;width:${widthPx}px;height:${ROW_H-5}px;background:${s.bg};border:1px solid ${s.border};border-radius:5px;padding:3px 5px;overflow:hidden;box-sizing:border-box;">`;
          h += `<div style="font-size:9.5px;font-weight:700;color:${s.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;">${c.qty>1?'×'+c.qty+' ':''}${c.member}</div>`;
          h += `<div style="font-size:8px;color:${s.color};opacity:0.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;">${c.boothShort}</div>`;
          h += `</div>`;
        });
        h += `</div></div>`;
      });

      h += `</div>`;
      return h;
    }

    // ── Table ──
    function buildTable() {
      let h = `<table style="width:100%;border-collapse:collapse;table-layout:fixed;font-size:10.5px;">
        <colgroup>
          <col style="width:26%"><col style="width:15%"><col style="width:17%">
          <col style="width:20%"><col style="width:11%"><col style="width:11%">
        </colgroup>
        <thead><tr style="background:linear-gradient(135deg,#1a0a2e,#2d1b4e);">
          <th style="color:#fff;padding:7px 8px;text-align:left;font-weight:700;">สมาชิก / กิจกรรม</th>
          <th style="color:#fff;padding:7px 8px;text-align:left;font-weight:700;">วัน</th>
          <th style="color:#fff;padding:7px 8px;text-align:left;font-weight:700;">เวลา</th>
          <th style="color:#fff;padding:7px 8px;text-align:left;font-weight:700;">บูธ</th>
          <th style="color:#fff;padding:7px 8px;text-align:center;font-weight:700;">Tickets</th>
          <th style="color:#fff;padding:7px 8px;text-align:right;font-weight:700;">ราคา</th>
        </tr></thead><tbody>`;

      let curDay=null, alt=false;
      rows.forEach(r => {
        if(r.day!==curDay){
          curDay=r.day; alt=false;
          h+=`<tr><td colspan="6" style="background:#f5f0ff;padding:6px 8px;font-weight:700;font-size:10.5px;color:#6d28d9;">📅 ${dayFull[r.day]}</td></tr>`;
        }
        const bg = alt?'#faf8ff':'#fff';
        const tk = r.t>0
          ? `<span style="background:#fef3c7;border:1px solid #fcd34d;border-radius:5px;padding:1px 6px;font-weight:700;color:#92400e;font-size:9.5px;">${r.t}${r.qty>1?' ×'+r.qty:''}</span>`
          : `<span style="color:#059669;font-weight:600;">Free</span>`;
        const cost = r.c>0
          ? `<span style="color:#ff3d79;font-weight:700;">฿${r.c.toLocaleString()}</span>`
          : `<span style="color:#059669;">-</span>`;
        h+=`<tr style="background:${bg};border-bottom:1px solid #f0e8ff;">
          <td style="padding:7px 8px;font-weight:600;color:#1a0a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.displayName}</td>
          <td style="padding:7px 8px;color:#4b5563;overflow:hidden;white-space:nowrap;">${dayShort[r.day]||r.day}</td>
          <td style="padding:7px 8px;color:#374151;font-family:monospace;white-space:nowrap;">${r.time}</td>
          <td style="padding:7px 8px;color:#4b5563;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.boothShort}</td>
          <td style="padding:7px 8px;text-align:center;">${tk}</td>
          <td style="padding:7px 8px;text-align:right;white-space:nowrap;">${cost}</td>
        </tr>`;
        alt=!alt;
      });
      h+=`</tbody></table>`;
      return h;
    }

    // ── Build print HTML (inner content only, no html/head/body tags) ──
    const PRINT_W = TL_W + 48;
    const html = `
      <div style="width:${PRINT_W}px;background:#fffaf7;font-family:'Noto Sans Thai',sans-serif;">

        <div style="background:linear-gradient(135deg,#ff6b9d,#d4a5ff);padding:22px 24px 18px;width:${PRINT_W}px;box-sizing:border-box;">
          <div style="font-size:8px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,0.8);margin-bottom:5px;text-transform:uppercase;">Fan Event Planner 🌸</div>
          <div style="font-size:20px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:5px;">BNK48 × CGM48 — On Cloud 9 Festival</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.85);">30 พฤษภาคม – 1 มิถุนายน 2026 · MCC Hall, The Mall Lifestore Bangkae</div>
          <div style="margin-top:10px;display:flex;gap:7px;flex-wrap:wrap;">
            <span style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:99px;padding:3px 11px;font-size:9.5px;color:#fff;font-weight:600;">รวม ${totalTickets} tickets</span>
            <span style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:99px;padding:3px 11px;font-size:9.5px;color:#fff;font-weight:600;">รวมทั้งหมด ฿${total.toLocaleString()} THB</span>
          </div>
        </div>

        <div style="padding:18px 24px;width:${PRINT_W}px;box-sizing:border-box;">
          <div style="font-size:9px;font-weight:700;letter-spacing:.08em;color:#7a6892;text-transform:uppercase;margin-bottom:8px;">📅 ตารางเวลา</div>
          ${buildTimeline()}

          <div style="font-size:9px;font-weight:700;letter-spacing:.08em;color:#7a6892;text-transform:uppercase;margin:18px 0 8px;">🗒 รายการกิจกรรมที่เลือก</div>
          <div style="border:1.5px solid #e9d5ff;border-radius:10px;overflow:hidden;width:${TL_W}px;">
            ${buildTable()}
          </div>

          <div style="margin-top:14px;background:linear-gradient(135deg,#1a0a2e,#2d1b4e);border-radius:12px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;width:${TL_W}px;box-sizing:border-box;">
            <div>
              <div style="font-size:11px;font-weight:700;color:#d4a5ff;margin-bottom:3px;">รวมค่าใช้จ่ายทั้งหมด</div>
              <div style="font-size:9.5px;color:#a78bca;">รวม ${totalTickets} tickets จาก ${rows.length} รอบกิจกรรม</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:24px;font-weight:700;color:#ff6b9d;line-height:1;">฿${total.toLocaleString()}</div>
              <div style="font-size:9px;color:#a78bca;margin-top:2px;">THB</div>
            </div>
          </div>

          <div style="margin-top:12px;text-align:center;font-size:8px;color:#9ca3af;">
            สร้างโดย BNK48 × CGM48 Fan Event Planner · ${new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})}
          </div>
        </div>

      </div>`;

    // ── Inject directly into page body ──
    const wrapper = document.createElement('div');
    wrapper.style.cssText = [
      'position:absolute',
      'left:-99999px',
      'top:0',
      `width:${PRINT_W}px`,
      'background:#fffaf7',
      'font-family:Noto Sans Thai,sans-serif',
      'z-index:-1',
      'overflow:visible',
    ].join(';');

    wrapper.innerHTML = html;
    document.body.appendChild(wrapper);

    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 600));

    const renderW = wrapper.scrollWidth;
    const renderH = wrapper.scrollHeight;

    const canvas = await html2canvas(wrapper, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#fffaf7',
      logging: false,
      width: renderW,
      height: renderH,
      windowWidth: renderW + 200,   // give extra room so nothing clips
      scrollX: -wrapper.getBoundingClientRect().left,
      scrollY: -wrapper.getBoundingClientRect().top,
      x: 0,
      y: 0,
    });

    document.body.removeChild(wrapper);

    // ── Build PDF ──
    const { jsPDF } = window.jspdf;
    const pdfW = 210; // A4 mm
    const pdfH = 297;
    const pxPerMm = (canvas.width / pdfW);
    const pageHpx = pdfH * pxPerMm;

    const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    let pageNum = 0;
    let remainH = canvas.height;

    while(remainH > 0) {
      const sliceH = Math.min(pageHpx, remainH);
      const sc = document.createElement('canvas');
      sc.width = canvas.width;
      sc.height = Math.ceil(sliceH);
      sc.getContext('2d').drawImage(canvas, 0, pageNum*pageHpx, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
      if(pageNum > 0) doc.addPage('a4','portrait');
      doc.addImage(sc.toDataURL('image/jpeg',0.95), 'JPEG', 0, 0, pdfW, sliceH/pxPerMm);
      remainH -= sliceH;
      pageNum++;
    }

    doc.save('BNK48-CGM48-OnCloud9-MySchedule.pdf');

  } catch(err) {
    alert('เกิดข้อผิดพลาด: ' + err.message);
    console.error(err);
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = '<span class="pdf-ico">📄</span> ดาวน์โหลดตาราง PDF';
  }
}

initMembers();
