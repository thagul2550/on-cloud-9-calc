<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;background:#0f0f13;color:#e8e6f0;min-height:100vh}
  .container{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}

  /* Header */
  .hdr{text-align:center;padding:2rem 0 1.5rem;border-bottom:1px solid #2a2740}
  .hdr h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:0.02em}
  .hdr .sub{font-size:13px;color:#888;margin-top:6px}
  .hdr .price-badge{display:inline-block;margin-top:10px;background:#3d2f8a;border:1px solid #6c5ce7;color:#c4b5fd;font-size:13px;font-weight:600;padding:5px 16px;border-radius:99px}

  /* Section label */
  .sec-lbl{font-size:11px;font-weight:600;color:#666;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;margin-top:1.5rem}

  /* Member grid */
  .mbr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:6px}
  .mbr-btn{border:1px solid #2a2740;border-radius:8px;padding:7px 4px;cursor:pointer;background:#1a1828;color:#ccc;font-size:11px;font-weight:500;text-align:center;transition:all .15s;font-family:'Sarabun',sans-serif}
  .mbr-btn:hover{background:#25213a;border-color:#4a3d8a}
  .mbr-btn.active{background:#2d1f6e;border-color:#6c5ce7;color:#c4b5fd;font-weight:700}

  /* Day tabs */
  .tab-row{display:flex;gap:6px;margin-top:1.25rem;margin-bottom:12px;flex-wrap:wrap}
  .tab{font-size:12px;padding:5px 14px;border-radius:99px;border:1px solid #2a2740;background:#1a1828;cursor:pointer;color:#888;font-family:'Sarabun',sans-serif;transition:all .15s}
  .tab:hover{border-color:#4a3d8a;color:#c4b5fd}
  .tab.active{background:#2d1f6e;border-color:#6c5ce7;color:#c4b5fd;font-weight:600}

  /* Day label */
  .day-lbl-row{font-size:13px;color:#aaa;margin-bottom:10px;padding-left:2px}

  /* Booth block */
  .booth-block{border:1px solid #2a2740;border-radius:12px;padding:1rem 1.1rem;margin-bottom:10px;background:#16131f}
  .booth-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .booth-name{font-size:13px;font-weight:600;color:#e0d8ff}
  .ticket-badge{font-size:10px;padding:2px 8px;border-radius:99px;background:#1f1a35;border:1px solid #3d3468;color:#a89fd4;white-space:nowrap}

  /* Round items */
  .round-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
  .r-item{border:1px solid #2a2740;border-radius:8px;padding:8px 10px;cursor:pointer;background:#1a1828;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
  .r-item:hover{border-color:#4a3d8a}
  .r-item.sel{background:#1e1645;border-color:#6c5ce7}
  .r-item .rn{font-size:12px;color:#ddd;font-weight:500}
  .r-item .rt{font-size:10px;color:#666;margin-top:2px}
  .r-item.sel .rn{color:#c4b5fd}
  .r-item.sel .rt{color:#8b7fd4}

  /* Qty control */
  .qty-w{display:flex;align-items:center;gap:4px;flex-shrink:0}
  .qb{width:22px;height:22px;border:1px solid #3a3256;border-radius:5px;background:#0f0f18;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#c4b5fd;transition:all .12s;line-height:1}
  .qb:hover{background:#2d1f6e;border-color:#6c5ce7}
  .qn{font-size:12px;min-width:16px;text-align:center;font-weight:700;color:#fff}

  /* No schedule */
  .no-sched{text-align:center;padding:2.5rem;color:#555;font-size:13px}

  /* Summary */
  .sum-card{background:#16131f;border:1px solid #2a2740;border-radius:12px;padding:1.1rem 1.25rem;margin-top:1.5rem;position:sticky;bottom:1rem}
  .sum-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .sum-hdr span{font-size:13px;font-weight:600;color:#e0d8ff}
  .clr-btn{font-size:11px;color:#666;cursor:pointer;border:none;background:none;text-decoration:underline;font-family:'Sarabun',sans-serif}
  .clr-btn:hover{color:#c4b5fd}
  .sum-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:#888;gap:8px}
  .sum-row span:first-child{flex:1}
  .sum-row span:last-child{white-space:nowrap;color:#a89fd4}
  .sum-divider{border:none;border-top:1px solid #2a2740;margin:8px 0}
  .sum-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;color:#fff;margin-top:2px}
  .sum-total .amt{color:#c4b5fd}
  .sum-tickets{font-size:11px;color:#666;margin-top:4px;text-align:right}
  .ask-btn{margin-top:10px;width:100%;padding:9px;border:1px solid #3d3468;border-radius:8px;background:#1f1a35;font-size:13px;cursor:pointer;color:#c4b5fd;font-family:'Sarabun',sans-serif;transition:all .15s}
  .ask-btn:hover{background:#2d1f6e;border-color:#6c5ce7}

  /* Empty state */
  .empty-h{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;color:#555;font-size:13px;gap:8px;text-align:center}
  .empty-h .ico{font-size:36px;opacity:.5}

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:#0f0f13}
  ::-webkit-scrollbar-thumb{background:#2a2740;border-radius:3px}

  @media(max-width:600px){
    .round-grid{grid-template-columns:1fr}
    .mbr-grid{grid-template-columns:repeat(auto-fill,minmax(72px,1fr))}
  }

const DAYS = ["30 May 2026","31 May 2026","1 June 2026"];
const DAY_LABELS = {
  "30 May 2026":"เสาร์ที่ 30 พฤษภาคม 2026",
  "31 May 2026":"อาทิตย์ที่ 31 พฤษภาคม 2026",
  "1 June 2026":"จันทร์ที่ 1 มิถุนายน 2026"
};

const memberSet = new Set();
Object.keys(SCHED).forEach(boothId=>{
  if (boothId === 'fanmeet') return;
  Object.values(SCHED[boothId]).forEach(slots=>{
    slots.forEach(slot=>{ slot.slice(1).forEach(m=>memberSet.add(m)); });
  });
});
const MEMBERS = [...memberSet].sort();

let state = { member: null, selections: {}, curDay: "30 May 2026" };

function initMembers(){
  const g = document.getElementById('mGrid');
  
  const stageBtn = document.createElement('button');
  stageBtn.className='mbr-btn'; stageBtn.style.gridColumn = '1 / -1'; stageBtn.style.padding = '10px'; stageBtn.style.background = '#2c225a'; stageBtn.style.borderColor = '#4a3d8a'; stageBtn.style.color = '#fff'; stageBtn.textContent='⭐ กิจกรรมเวทีทั้งหมด (Fanmeet & Stage)'; stageBtn.id='mb-⭐ กิจกรรมเวที';
  stageBtn.onclick=()=>selMember('⭐ กิจกรรมเวที');
  g.appendChild(stageBtn);

  MEMBERS.forEach(m=>{
    const b = document.createElement('button');
    b.className='mbr-btn'; b.textContent=m; b.id='mb-'+m;
    b.onclick=()=>selMember(m);
    g.appendChild(b);
  });
}

function selMember(m){
  document.querySelectorAll('.mbr-btn').forEach(b=>b.classList.remove('active'));
  const el = document.getElementById('mb-'+m);
  if(el) el.classList.add('active');
  state.member=m;
  renderSched();
}

function getKey(member,booth,day,idx){ return member+'|'+booth+'|'+day+'|'+idx; }

function renderSched(){
  const m = state.member;
  if(!m) return;
  const area = document.getElementById('schedArea');
  area.innerHTML='';

  // Tabs
  const tabRow = document.createElement('div');
  tabRow.className='tab-row';
  DAYS.forEach(d=>{
    const t=document.createElement('button');
    t.className='tab'+(d===state.curDay?' active':'');
    t.textContent=d;
    t.onclick=()=>{ state.curDay=d; renderSched(); };
    tabRow.appendChild(t);
  });
  area.appendChild(tabRow);

  const dayLbl = document.createElement('div');
  dayLbl.className='day-lbl-row';
  dayLbl.textContent=DAY_LABELS[state.curDay];
  area.appendChild(dayLbl);

  let hasAny=false;
  BOOTHS.forEach(booth=>{
    const slots=(SCHED[booth.id]||{})[state.curDay]||[];
    const mySlots=slots.map((s,i)=>({slot:s,idx:i})).filter(({slot})=>slot.slice(1).includes(m));
    if(mySlots.length===0) return;
    hasAny=true;

    const block=document.createElement('div');
    block.className='booth-block';

    const dh=document.createElement('div');
    dh.className='booth-hdr';
    dh.innerHTML=`<span class="booth-name">${booth.name}</span><span class="ticket-badge">${booth.tickets} Ticket${booth.tickets>1?'s':''} = ฿${(booth.tickets*TICKET_PRICE).toLocaleString()} / รอบ</span>`;
    block.appendChild(dh);

    const rg=document.createElement('div');
    rg.className='round-grid';

    mySlots.forEach(({slot,idx})=>{
      const key=getKey(m,booth.id,state.curDay,idx);
      const qty=state.selections[key]||0;
      const others=slot.slice(1).filter(x=>x!==m);
      const item=document.createElement('div');
      item.className='r-item'+(qty>0?' sel':'');
      item.id='bi-'+key.replace(/[\|]/g,'_');
      
      let rtText = `กับ ${others.join(', ')}`;
      if (m === "⭐ กิจกรรมเวที" && booth.id === "fanmeet") {
        rtText = others.join(', ');
      }

      item.innerHTML=`
        <div style="flex:1;min-width:0">
          <div class="rn">${slot[0]}</div>
          <div class="rt">${rtText}</div>
        </div>
        <div class="qty-w">
          <button class="qb" onclick="chQty('${key}',${booth.tickets},-1)">−</button>
          <span class="qn" id="qn-${key.replace(/[\|]/g,'_')}">${qty}</span>
          <button class="qb" onclick="chQty('${key}',${booth.tickets},1)">+</button>
        </div>
      `;
      rg.appendChild(item);
    });
    block.appendChild(rg);
    area.appendChild(block);
  });

  if(!hasAny){
    const emp=document.createElement('div');
    emp.className='no-sched';
    emp.textContent=`${m} ไม่มีรอบในวันนี้`;
    area.appendChild(emp);
  }
}

function chQty(key,tickets,delta){
  const cur=state.selections[key]||0;
  const next=Math.max(0,cur+delta);
  state.selections[key]=next;
  const safeKey=key.replace(/[\|]/g,'_');
  const qnEl=document.getElementById('qn-'+safeKey);
  if(qnEl) qnEl.textContent=next;
  const biEl=document.getElementById('bi-'+safeKey);
  if(biEl) biEl.classList.toggle('sel',next>0);
  updateSum();
}

function updateSum(){
  let total=0, totalTickets=0;
  const rows=[];
  const timelineItemMap = {};

  Object.entries(state.selections).forEach(([key,qty])=>{
    if(qty===0) return;
    const [member,boothId,day,idxStr]=key.split('|');
    const idx=parseInt(idxStr);
    const booth=BOOTHS.find(b=>b.id===boothId);
    if(!booth) return;
    const slot=((SCHED[boothId]||{})[day]||[])[idx];
    if(!slot) return;
    
    const t=booth.tickets*qty;
    const c=t*TICKET_PRICE;
    total+=c; totalTickets+=t;
    let costText = t > 0 ? `${t} tickets = ฿${c.toLocaleString()}` : `Free`;
    rows.push({label:`${member} — ${booth.short} (${day}) ${slot[0]} ×${qty}`,t,c,costText});

    if(!timelineItemMap[day]) timelineItemMap[day] = [];
    timelineItemMap[day].push({
      time: slot[0],
      boothName: booth.short,
      member: member,
      qty: qty
    });
  });

  document.getElementById('sumArea').style.display=rows.length>0?'block':'none';
  document.getElementById('sumRows').innerHTML=rows.map(r=>
    `<div class="sum-row"><span>${r.label}</span><span>${r.costText}</span></div>`
  ).join('');
  document.getElementById('totalAmt').textContent='฿'+total.toLocaleString();
  document.getElementById('ticketCount').textContent=`รวม ${totalTickets} tickets`;

  let timelineHTML = '';
  DAYS.forEach(day => {
    if(timelineItemMap[day] && timelineItemMap[day].length > 0) {
      timelineHTML += `<div style="font-size:12px;font-weight:600;color:#c4b5fd;margin:12px 0 6px;border-bottom:1px solid #2a2740;padding-bottom:4px;">${DAY_LABELS[day]}</div>`;
      timelineItemMap[day].sort((a,b)=> a.time.localeCompare(b.time));
      timelineItemMap[day].forEach(ti => {
        timelineHTML += `<div class="sum-row" style="color:#ddd;padding:4px 0;">
          <span style="flex:0 0 85px;color:#888;">${ti.time.split('–')[0] || ti.time}</span>
          <span>${ti.boothName}</span>
          <span style="color:#a89fd4">${ti.member} ${ti.qty>1?'(×'+ti.qty+')':''}</span>
        </div>`;
      });
    }
  });
  document.getElementById('timelineRows').innerHTML = timelineHTML;
}

function clearAll(){
  state.selections={};
  if(state.member) renderSched();
  updateSum();
}

initMembers();
</script>
